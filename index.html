<!DOCTYPE html>
<html>

<head>
<script src="https://cdn.jsdelivr.net/npm/@jaames/iro@5"></script>
</head>

<body>

<h2>Select the colour that matches the sound</h2>

<div id="picker"></div>

<br>

<button onclick="submitColour()">Submit</button>

<script>

var colorPicker = new iro.ColorPicker("#picker", {
  width: 250,
  color: "#ff0000",
  layout: [
    { component: iro.ui.Wheel }
  ]
});

function submitColour(){

  const hue = Math.round(colorPicker.color.hue);

  const tallyURL =
  "https://tally.so/r/YOURFORMID?hue=" + hue;

  window.location.href = tallyURL;
}

</script>

</body>
</html>
